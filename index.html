<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#14171a">
<link rel="apple-touch-icon" href="icon-512.png">
<title>IRON LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171a;
    --surface:#1c2024;
    --surface-2:#232830;
    --line:#2e343b;
    --text:#ece9e2;
    --muted:#8b9299;
    --accent:#4c82b0;
    --accent-dim:#3a627f;
    --gold:#c7a252;
    --danger:#b0524c;
    --success:#6f9e76;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:100px;
  }
  header.top{
    padding:64px 18px 14px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, #191d21, #14171a);
    position:sticky;
    top:0;
    z-index:10;
  }
  .brand{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    letter-spacing:0.06em;
    font-size:20px;
    text-transform:uppercase;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand .dot{ color:var(--gold); }
  .brand-sub{
    color:var(--muted);
    font-size:12px;
    margin-top:2px;
    letter-spacing:0.03em;
  }
  main{ flex:1; padding:16px 16px 20px; }
  .tabbar{
    position:fixed;
    bottom:0; left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:520px;
    display:flex;
    border-top:1px solid var(--line);
    background:#191d21;
    z-index:20;
    padding-bottom:34px;
  }
  .tabbar button{
    flex:1;
    background:none;
    border:none;
    color:var(--muted);
    font-family:'Oswald',sans-serif;
    font-size:15px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:17px 4px 15px;
    cursor:pointer;
    border-top:2px solid transparent;
    transition:color .15s;
  }
  .tabbar button.active{
    color:var(--text);
    border-top-color:var(--gold);
  }
  h2.section-title{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.05em;
    font-size:15px;
    color:var(--muted);
    margin:0 0 12px;
  }
  .day-picker{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .day-picker button{
    flex:1;
    padding:12px 6px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--muted);
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:0.04em;
    cursor:pointer;
    text-align:center;
    transition:.15s;
  }
  .day-picker button .dname{
    display:block;
    font-size:10px;
    font-weight:400;
    text-transform:none;
    letter-spacing:0;
    color:var(--muted);
    margin-top:2px;
  }
  .day-picker button.active{
    background:var(--accent-dim);
    border-color:var(--accent);
    color:#fff;
  }
  .day-picker button.active .dname{ color:#cfe0ee; }

  .exercise-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    margin-bottom:12px;
  }
  .ex-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:2px;
  }
  .ex-name{ font-weight:600; font-size:15px; }
  .ex-target{ color:var(--muted); font-size:12.5px; margin-top:1px;}
  .ex-prev{ color:var(--gold); font-size:11.5px; margin-top:6px; font-variant-numeric:tabular-nums;}
  .set-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }
  .set-label{
    width:20px;
    color:var(--muted);
    font-size:12px;
    font-family:'Oswald',sans-serif;
    flex-shrink:0;
  }
  .set-row input{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:7px;
    color:var(--text);
    padding:8px 8px;
    font-size:14px;
    width:100%;
    font-variant-numeric:tabular-nums;
    font-family:'Inter',sans-serif;
  }
  .set-row input:focus{ outline:1px solid var(--accent); border-color:var(--accent); }
  .set-row .x{ color:var(--muted); font-size:12px; flex-shrink:0; }
  .set-row .unit{ color:var(--muted); font-size:11px; width:26px; flex-shrink:0;}
  .set-row .done-check{
    width:22px; height:22px;
    flex-shrink:0;
    border-radius:6px;
    border:1px solid var(--line);
    background:var(--surface-2);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--success);
    font-size:13px;
  }
  .set-row .done-check.on{ background:rgba(111,158,118,0.18); border-color:var(--success); }
  .add-set-btn{
    margin-top:8px;
    background:none;
    border:1px dashed var(--line);
    color:var(--muted);
    border-radius:7px;
    padding:6px 10px;
    font-size:12px;
    cursor:pointer;
  }

  /* Plate diagram */
  .plate-viz{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:0;
    height:34px;
  }
  .plate-viz .side{ display:flex; align-items:center; }
  .plate-viz .side.left{ flex-direction:row-reverse; }
  .plate-viz .bar{
    height:5px;
    background:#4a5158;
    flex:1;
    min-width:20px;
    border-radius:2px;
  }
  .plate{
    border-radius:3px;
    margin:0 1px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#14171a;
    font-size:8px;
    font-weight:700;
    font-family:'Oswald',sans-serif;
  }
  .plate-label{
    font-size:10.5px;
    color:var(--muted);
    margin-top:3px;
    text-align:center;
    font-variant-numeric:tabular-nums;
  }

  .finish-btn{
    width:100%;
    padding:15px;
    background:var(--gold);
    color:#14171a;
    border:none;
    border-radius:var(--radius);
    font-family:'Oswald',sans-serif;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    font-size:14px;
    cursor:pointer;
    margin-top:8px;
  }
  .finish-btn:active{ opacity:0.85; }

  .toast{
    position:fixed;
    bottom:88px; left:50%;
    transform:translateX(-50%);
    background:var(--surface-2);
    border:1px solid var(--gold);
    color:var(--text);
    padding:10px 18px;
    border-radius:8px;
    font-size:13px;
    z-index:50;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    max-width:90%;
    text-align:center;
  }

  /* Progress tab */
  .ex-list-item{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
    margin-bottom:8px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .ex-list-item .name{ font-weight:600; font-size:14px;}
  .ex-list-item .best{ color:var(--gold); font-size:12px; font-variant-numeric:tabular-nums;}
  .history-back{
    color:var(--accent);
    font-size:13px;
    cursor:pointer;
    margin-bottom:12px;
    display:inline-block;
  }
  .spark{ margin: 4px 0 16px; }
  table.hist{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  table.hist th{
    text-align:left;
    color:var(--muted);
    font-weight:500;
    padding:6px 4px;
    border-bottom:1px solid var(--line);
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  table.hist td{
    padding:8px 4px;
    border-bottom:1px solid var(--line);
    font-variant-numeric:tabular-nums;
  }
  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:14px;
    line-height:1.5;
  }

  /* Program editor */
  .prog-day-block{ margin-bottom:22px; }
  .prog-ex-row{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:8px;
  }
  .prog-ex-row input[type=text]{
    width:100%;
    background:none;
    border:none;
    color:var(--text);
    font-weight:600;
    font-size:14px;
    padding:2px 0;
    margin-bottom:6px;
  }
  .prog-ex-row .row-controls{
    display:flex;
    gap:6px;
    align-items:center;
  }
  .prog-ex-row .row-controls input[type=number]{
    width:44px;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--text);
    padding:5px;
    font-size:12px;
    text-align:center;
  }
  .prog-ex-row select{
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:5px;
    color:var(--text);
    padding:5px 4px;
    font-size:12px;
  }
  .prog-ex-row .lbl{ font-size:10.5px; color:var(--muted); }
  .del-x{
    color:var(--danger);
    background:none;
    border:none;
    cursor:pointer;
    font-size:16px;
    margin-left:auto;
    padding:0 4px;
  }
  .add-ex-btn{
    width:100%;
    padding:9px;
    background:none;
    border:1px dashed var(--line);
    color:var(--muted);
    border-radius:8px;
    font-size:12.5px;
    cursor:pointer;
    margin-top:2px;
  }
  .rename-day{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
    font-size:14px;
    color:var(--gold);
    background:none;
    border:none;
    border-bottom:1px solid var(--line);
    padding:2px 0 4px;
    margin-bottom:10px;
    width:100%;
  }
  .reset-link{
    color:var(--danger);
    font-size:12px;
    text-align:center;
    display:block;
    margin:28px auto 0;
    cursor:pointer;
    opacity:0.7;
  }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand"><span>IRON</span><span class="dot">·</span><span>LOG</span></div>
    <div class="brand-sub" id="headerSub">3-day full body — muscle &amp; strength</div>
  </header>
  <main id="main"></main>
  <nav class="tabbar">
    <button data-tab="train" class="active">Train</button>
    <button data-tab="progress">Progress</button>
    <button data-tab="program">Program</button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const BAR_WEIGHT = 45;
const PLATE_SIZES = [45,35,25,10,5,2.5];
const PLATE_COLOR = {45:'#c7a252',35:'#4c82b0',25:'#6f9e76',10:'#8b9299',5:'#b0524c',2.5:'#c9cdd1'};

const SUPABASE_URL = 'https://ukeytjmlhhkyyudhzigh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_e-vRbemFfjrQrXjvsJ-1tA_-ELHIfna';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const BUILD_TAG = '2026-07-10 16:49 CDT';

let program = null;
let logs = null; // { sessions: [ {id,date,dayId,entries:{exId:[{w,r}]}} ] }
let activeTab = 'train';
let activeDayId = null;
let progressView = 'list'; // 'list' | 'detail'
let progressExId = null;
let currentSets = {}; // in-progress sets for the active session: {exId: [{w,r,done}]}

function defaultProgram(){
  return {
    days: [
      { id:'A', name:'Squat Day', exercises:[
        { id:'a1', name:'Back Squat', type:'barbell', sets:4, repLow:6, repHigh:8 },
        { id:'a2', name:'Bench Press', type:'barbell', sets:4, repLow:6, repHigh:8 },
        { id:'a3', name:'Barbell Row', type:'barbell', sets:3, repLow:8, repHigh:10 },
        { id:'a4', name:'Seated DB Shoulder Press', type:'dumbbell', sets:3, repLow:10, repHigh:12 },
        { id:'a5', name:'Romanian Deadlift', type:'barbell', sets:3, repLow:10, repHigh:12 },
        { id:'a7', name:'EZ-Bar Curl', type:'dumbbell', sets:3, repLow:10, repHigh:12 },
        { id:'a8', name:'Overhead Tricep Extension', type:'dumbbell', sets:3, repLow:10, repHigh:12 },
        { id:'a6', name:'Hanging Knee Raise', type:'bodyweight', sets:3, repLow:12, repHigh:15 }
      ]},
      { id:'B', name:'Deadlift Day', exercises:[
        { id:'b1', name:'Deadlift', type:'barbell', sets:4, repLow:5, repHigh:6 },
        { id:'b2', name:'Incline DB Press', type:'dumbbell', sets:3, repLow:8, repHigh:10 },
        { id:'b3', name:'Weighted Pull-up / Lat Pulldown', type:'machine', sets:3, repLow:8, repHigh:10 },
        { id:'b4', name:'Leg Press', type:'machine', sets:3, repLow:10, repHigh:12 },
        { id:'b5', name:'Lateral Raise', type:'dumbbell', sets:3, repLow:12, repHigh:15 },
        { id:'b7', name:'Hammer Curl', type:'dumbbell', sets:3, repLow:10, repHigh:12 },
        { id:'b8', name:'Skull Crusher', type:'dumbbell', sets:3, repLow:10, repHigh:12 },
        { id:'b6', name:'Cable Crunch', type:'machine', sets:3, repLow:12, repHigh:15 }
      ]},
      { id:'C', name:'Press Day', exercises:[
        { id:'c1', name:'Overhead Press', type:'barbell', sets:4, repLow:6, repHigh:8 },
        { id:'c2', name:'Bulgarian Split Squat', type:'dumbbell', sets:3, repLow:8, repHigh:10 },
        { id:'c3', name:'Chin-up', type:'bodyweight', sets:3, repLow:6, repHigh:10 },
        { id:'c4', name:'Close-Grip Bench Press', type:'barbell', sets:3, repLow:8, repHigh:10 },
        { id:'c5', name:'Leg Curl', type:'machine', sets:3, repLow:10, repHigh:12 },
        { id:'c7', name:'Barbell Curl', type:'dumbbell', sets:3, repLow:8, repHigh:10 },
        { id:'c8', name:'Tricep Pushdown', type:'machine', sets:3, repLow:12, repHigh:15 }
      ]}
    ]
  };
}

async function loadData(){
  let cloudProgram = null, cloudLogs = null;
  try{
    const { data, error } = await sb.from('app_state').select('key,data').in('key', ['program','logs']);
    if(error) throw error;
    (data||[]).forEach(row=>{
      if(row.key==='program') cloudProgram = row.data;
      if(row.key==='logs') cloudLogs = row.data;
    });
  }catch(e){ console.warn('Cloud load failed, falling back to local cache:', e); }

  if(cloudProgram){
    program = cloudProgram;
    try{ localStorage.setItem('ironlog_program', JSON.stringify(program)); }catch(e){}
  }else{
    try{
      const p = localStorage.getItem('ironlog_program');
      program = p ? JSON.parse(p) : defaultProgram();
    }catch(e){ program = defaultProgram(); }
  }

  if(cloudLogs){
    logs = cloudLogs;
    try{ localStorage.setItem('ironlog_logs', JSON.stringify(logs)); }catch(e){}
  }else{
    try{
      const l = localStorage.getItem('ironlog_logs');
      logs = l ? JSON.parse(l) : { sessions: [] };
    }catch(e){ logs = { sessions: [] }; }
  }

  if(!program) program = defaultProgram();
  if(!logs) logs = { sessions: [] };
  activeDayId = nextDayId();
}

async function saveProgram(){
  try{ localStorage.setItem('ironlog_program', JSON.stringify(program)); }
  catch(e){ console.error('save program failed', e); showToast('Could not save — storage may be full or blocked.'); }
  try{
    const { error } = await sb.from('app_state').upsert({ key:'program', data: program, updated_at: new Date().toISOString() });
    if(error) throw error;
  }catch(e){ console.warn('Cloud sync failed for program (saved locally):', e); showToast('Saved on this device — will sync when back online.'); }
}
async function saveLogs(){
  try{ localStorage.setItem('ironlog_logs', JSON.stringify(logs)); }
  catch(e){ console.error('save logs failed', e); showToast('Could not save — storage may be full or blocked.'); }
  try{
    const { error } = await sb.from('app_state').upsert({ key:'logs', data: logs, updated_at: new Date().toISOString() });
    if(error) throw error;
  }catch(e){ console.warn('Cloud sync failed for logs (saved locally):', e); showToast('Saved on this device — will sync when back online.'); }
}

function getDay(id){ return program.days.find(d=>d.id===id); }

function lastSessionFor(exId){
  for(let i=logs.sessions.length-1;i>=0;i--){
    const s = logs.sessions[i];
    if(s.entries[exId]) return s.entries[exId];
  }
  return null;
}

function calcPlates(totalWeight){
  let perSide = (totalWeight - BAR_WEIGHT)/2;
  if(perSide <= 0 || isNaN(perSide)) return [];
  let remaining = Math.round(perSide*10)/10;
  const plates=[];
  for(const p of PLATE_SIZES){
    while(remaining >= p - 0.05){
      plates.push(p);
      remaining = Math.round((remaining - p)*10)/10;
    }
  }
  return plates;
}

function plateVizHTML(weight){
  const plates = calcPlates(weight);
  if(!plates.length){
    return `<div class="plate-label">Bar only (${BAR_WEIGHT} lb) — enter weight above ${BAR_WEIGHT} to see plates</div>`;
  }
  const mk = (arr)=>arr.map(p=>{
    const h = 14 + (p/45)*16;
    return `<div class="plate" style="width:${p>=25?10:7}px;height:${h}px;background:${PLATE_COLOR[p]}"></div>`;
  }).join('');
  return `
    <div class="plate-viz">
      <div class="side left">${mk(plates)}</div>
      <div class="bar"></div>
      <div class="side right">${mk(plates)}</div>
    </div>
    <div class="plate-label">${plates.join(', ')} lb per side + ${BAR_WEIGHT} lb bar</div>
  `;
}

function ensureCurrentSets(day){
  day.exercises.forEach(ex=>{
    if(!currentSets[ex.id]){
      currentSets[ex.id] = Array.from({length: ex.sets}, ()=>({w:'', r:'', done:false}));
    }
  });
}

function renderTrain(){
  const day = getDay(activeDayId);
  ensureCurrentSets(day);
  let html = `<div class="day-picker">`;
  program.days.forEach(d=>{
    html += `<button data-day="${d.id}" class="${d.id===activeDayId?'active':''}">${d.id}<span class="dname">${d.name}</span></button>`;
  });
  html += `</div>`;

  day.exercises.forEach(ex=>{
    const prev = lastSessionFor(ex.id);
    const prevText = prev ? `Last time: ${prev.map(s=>`${s.w}×${s.r}`).join(', ')}` : `No history yet`;
    html += `<div class="exercise-card" data-exid="${ex.id}">
      <div class="ex-head">
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">${ex.sets} sets × ${ex.repLow}${ex.repHigh!==ex.repLow?'–'+ex.repHigh:''} reps</div>
        </div>
      </div>
      <div class="ex-prev">${prevText}</div>
      <div class="sets-wrap">`;
    currentSets[ex.id].forEach((s, i)=>{
      html += `<div class="set-row" data-exid="${ex.id}" data-idx="${i}">
        <div class="set-label">#${i+1}</div>
        <input type="number" inputmode="decimal" placeholder="lb" class="w-input" value="${s.w}">
        <div class="x">×</div>
        <input type="number" inputmode="numeric" placeholder="reps" class="r-input" value="${s.r}">
        <div class="done-check ${s.done?'on':''}">${s.done?'✓':''}</div>
      </div>`;
    });
    html += `</div>`;
    html += `<button class="add-set-btn" data-addset="${ex.id}">+ add set</button>`;
    if(ex.type==='barbell'){
      const lastW = currentSets[ex.id].slice().reverse().find(s=>s.w)?.w;
      html += `<div class="plate-slot" data-plateslot="${ex.id}">${plateVizHTML(parseFloat(lastW)||0)}</div>`;
    }
    html += `</div>`;
  });

  html += `<button class="finish-btn" id="finishBtn">Finish workout</button>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('headerSub').textContent = `${day.name} · Day ${day.id}`;
  bindTrainEvents(day);
}

function bindTrainEvents(day){
  document.querySelectorAll('.day-picker button').forEach(b=>{
    b.onclick = ()=>{ activeDayId = b.dataset.day; renderTrain(); };
  });
  document.querySelectorAll('.set-row').forEach(row=>{
    const exId = row.dataset.exid, idx = +row.dataset.idx;
    const wInput = row.querySelector('.w-input');
    const rInput = row.querySelector('.r-input');
    const check = row.querySelector('.done-check');
    const syncDone = ()=>{
      const s = currentSets[exId][idx];
      const shouldBeDone = s.w !== '' && s.r !== '';
      s.done = shouldBeDone;
      check.classList.toggle('on', shouldBeDone);
      check.textContent = shouldBeDone ? '✓' : '';
    };
    wInput.oninput = ()=>{
      currentSets[exId][idx].w = wInput.value;
      const slot = document.querySelector(`[data-plateslot="${exId}"]`);
      if(slot) slot.innerHTML = plateVizHTML(parseFloat(wInput.value)||0);
      syncDone();
    };
    rInput.oninput = ()=>{ currentSets[exId][idx].r = rInput.value; syncDone(); };
    check.onclick = ()=>{
      currentSets[exId][idx].done = !currentSets[exId][idx].done;
      check.classList.toggle('on');
      check.textContent = currentSets[exId][idx].done ? '✓' : '';
    };
  });
  document.querySelectorAll('[data-addset]').forEach(btn=>{
    btn.onclick = ()=>{
      const exId = btn.dataset.addset;
      currentSets[exId].push({w:'', r:'', done:false});
      renderTrain();
    };
  });
  document.getElementById('finishBtn').onclick = finishWorkout;
}

async function finishWorkout(){
  const day = getDay(activeDayId);
  const entries = {};
  let anyData = false;
  let prCount = 0;
  day.exercises.forEach(ex=>{
    const sets = currentSets[ex.id]
      .filter(s=>s.w!=='' && s.r!=='')
      .map(s=>({w:parseFloat(s.w), r:parseInt(s.r)}));
    if(sets.length){
      anyData = true;
      const prev = lastSessionFor(ex.id);
      const topNow = Math.max(...sets.map(s=>s.w));
      const topPrev = prev ? Math.max(...prev.map(s=>s.w)) : 0;
      if(topNow > topPrev) prCount++;
      entries[ex.id] = sets;
    }
  });
  if(!anyData){
    showToast('Log at least one set before finishing.');
    return;
  }
  logs.sessions.push({
    id: 'session_' + Date.now(),
    date: new Date().toISOString().slice(0,10),
    dayId: activeDayId,
    entries
  });
  await saveLogs();
  currentSets = {};
  showToast(prCount>0 ? `Workout saved — ${prCount} new top weight${prCount>1?'s':''} 🏆` : 'Workout saved.');
  renderTrain();
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

function exportData(){
  const payload = { exportedAt: new Date().toISOString(), program, logs };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `iron-log-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup downloaded.');
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.program || !data.logs) throw new Error('missing fields');
      if(!confirm('This will replace everything currently in the app with the backup file. Continue?')) return;
      program = data.program;
      logs = data.logs;
      await saveProgram();
      await saveLogs();
      activeDayId = nextDayId();
      showToast('Backup restored.');
      renderActiveTab();
    }catch(e){
      showToast('That file doesn\'t look like a valid Iron Log backup.');
    }
  };
  reader.readAsText(file);
}

function nextDayId(){
  if(!logs.sessions.length) return program.days[0].id;
  const lastId = logs.sessions[logs.sessions.length-1].dayId;
  const idx = program.days.findIndex(d=>d.id===lastId);
  if(idx === -1) return program.days[0].id;
  const nextIdx = (idx+1) % program.days.length;
  return program.days[nextIdx].id;
}

function allExercisesFlat(){
  const map = {};
  program.days.forEach(d=>d.exercises.forEach(ex=>{ map[ex.id] = ex; }));
  return map;
}

function renderProgress(){
  const exMap = allExercisesFlat();
  if(progressView==='list'){
    let html = `<h2 class="section-title">Exercise history</h2>`;
    const ids = Object.keys(exMap);
    if(!logs.sessions.length){
      html += `<div class="empty-state">No workouts logged yet. Head to <strong>Train</strong> and finish a session to start building history.</div>`;
    } else {
      ids.forEach(id=>{
        const ex = exMap[id];
        const last = lastSessionFor(id);
        if(!last) return;
        const top = Math.max(...last.map(s=>s.w));
        html += `<div class="ex-list-item" data-exid="${id}">
          <div class="name">${ex.name}</div>
          <div class="best">${top} lb last</div>
        </div>`;
      });
    }
    document.getElementById('main').innerHTML = html;
    document.querySelectorAll('.ex-list-item').forEach(el=>{
      el.onclick = ()=>{ progressView='detail'; progressExId = el.dataset.exid; renderProgress(); };
    });
  } else {
    const ex = exMap[progressExId];
    const rows = [];
    logs.sessions.forEach(s=>{
      if(s.entries[progressExId]) rows.push({date:s.date, sets:s.entries[progressExId], sessionId:s.id});
    });
    let html = `<span class="history-back" id="backBtn">‹ All exercises</span>
      <h2 class="section-title">${ex.name}</h2>`;
    if(!rows.length){
      html += `<div class="empty-state">No sessions logged for this exercise yet.</div>`;
    } else {
      html += renderSparkline(rows);
      html += `<table class="hist"><thead><tr><th>Date</th><th>Sets</th><th></th></tr></thead><tbody>`;
      rows.slice().reverse().forEach(r=>{
        html += `<tr><td>${r.date}</td><td>${r.sets.map(s=>`${s.w}×${s.r}`).join(', ')}</td><td><span class="del-x" data-delsession="${r.sessionId}" data-exid="${progressExId}">×</span></td></tr>`;
      });
      html += `</tbody></table>`;
    }
    document.getElementById('main').innerHTML = html;
    document.getElementById('backBtn').onclick = ()=>{ progressView='list'; renderProgress(); };
    document.querySelectorAll('[data-delsession]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(!confirm('Delete this session\'s entry for this exercise? This cannot be undone.')) return;
        const sid = btn.dataset.delsession;
        const exId = btn.dataset.exid;
        const session = logs.sessions.find(s=>s.id===sid);
        if(session) delete session.entries[exId];
        logs.sessions = logs.sessions.filter(s=>Object.keys(s.entries).length>0);
        await saveLogs();
        renderProgress();
      };
    });
  }
}

function renderSparkline(rows){
  const tops = rows.map(r=>Math.max(...r.sets.map(s=>s.w)));
  const max = Math.max(...tops), min = Math.min(...tops);
  const range = (max-min)||1;
  const w = 480, h = 70, pad=8;
  const step = tops.length>1 ? (w-pad*2)/(tops.length-1) : 0;
  const pts = tops.map((v,i)=>{
    const x = pad + i*step;
    const y = h - pad - ((v-min)/range)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  return `<div class="spark"><svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="#c7a252" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg></div>`;
}

function renderProgramEditor(){
  let html = '';
  program.days.forEach((day, di)=>{
    html += `<div class="prog-day-block" data-dayidx="${di}">
      <input class="rename-day" data-rename="${di}" value="${day.name}">`;
    day.exercises.forEach((ex, ei)=>{
      html += `<div class="prog-ex-row" data-dayidx="${di}" data-exidx="${ei}">
        <input type="text" class="ex-name-input" value="${ex.name}">
        <div class="row-controls">
          <span class="lbl">Sets</span><input type="number" class="ex-sets" value="${ex.sets}" min="1" max="8">
          <span class="lbl">Reps</span><input type="number" class="ex-replow" value="${ex.repLow}" min="1" max="30">
          <span class="lbl">–</span><input type="number" class="ex-rephigh" value="${ex.repHigh}" min="1" max="30">
          <select class="ex-type">
            <option value="barbell" ${ex.type==='barbell'?'selected':''}>Barbell</option>
            <option value="dumbbell" ${ex.type==='dumbbell'?'selected':''}>Dumbbell</option>
            <option value="machine" ${ex.type==='machine'?'selected':''}>Machine</option>
            <option value="bodyweight" ${ex.type==='bodyweight'?'selected':''}>Bodyweight</option>
          </select>
          <button class="del-x" data-del="${di}:${ei}">×</button>
        </div>
      </div>`;
    });
    html += `<button class="add-ex-btn" data-addex="${di}">+ add exercise to ${day.name}</button>
    </div>`;
  });
  html += `<span class="reset-link" id="resetLink">Reset program to default 3-day split</span>`;
  html += `
    <h2 class="section-title" style="margin-top:28px;">Backup &amp; restore</h2>
    <button class="add-ex-btn" id="exportBtn">⬇ Export backup (.json)</button>
    <button class="add-ex-btn" id="importBtn" style="margin-top:8px;">⬆ Restore from backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <div class="brand-sub" style="margin-top:8px; text-align:center;">Your data syncs to the cloud automatically. Export a backup anytime as an extra safety net.</div>
    <div class="brand-sub" style="margin-top:14px; text-align:center; opacity:0.5;">Build ${BUILD_TAG}</div>
  `;
  document.getElementById('main').innerHTML = html;
  bindProgramEvents();
}

function bindProgramEvents(){
  document.querySelectorAll('[data-rename]').forEach(inp=>{
    inp.onchange = ()=>{ program.days[+inp.dataset.rename].name = inp.value; saveProgram(); };
  });
  document.querySelectorAll('.prog-ex-row').forEach(row=>{
    const di = +row.dataset.dayidx, ei = +row.dataset.exidx;
    const ex = program.days[di].exercises[ei];
    row.querySelector('.ex-name-input').onchange = e=>{ ex.name = e.target.value; saveProgram(); };
    row.querySelector('.ex-sets').onchange = e=>{ ex.sets = Math.max(1, parseInt(e.target.value)||1); saveProgram(); };
    row.querySelector('.ex-replow').onchange = e=>{ ex.repLow = parseInt(e.target.value)||1; saveProgram(); };
    row.querySelector('.ex-rephigh').onchange = e=>{ ex.repHigh = parseInt(e.target.value)||ex.repLow; saveProgram(); };
    row.querySelector('.ex-type').onchange = e=>{ ex.type = e.target.value; saveProgram(); };
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=>{
      const [di,ei] = btn.dataset.del.split(':').map(Number);
      program.days[di].exercises.splice(ei,1);
      saveProgram();
      renderProgramEditor();
    };
  });
  document.querySelectorAll('[data-addex]').forEach(btn=>{
    btn.onclick = ()=>{
      const di = +btn.dataset.addex;
      const newId = program.days[di].id.toLowerCase() + '_' + Date.now();
      program.days[di].exercises.push({ id:newId, name:'New Exercise', type:'barbell', sets:3, repLow:8, repHigh:10 });
      saveProgram();
      renderProgramEditor();
    };
  });
  document.getElementById('resetLink').onclick = async ()=>{
    if(confirm('Reset your program to the default 3-day split? This won\'t erase your logged history.')){
      program = defaultProgram();
      await saveProgram();
      activeDayId = program.days[0].id;
      renderProgramEditor();
    }
  };
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = (e)=>{
    if(e.target.files[0]) importDataFromFile(e.target.files[0]);
    e.target.value = '';
  };
}

function renderActiveTab(){
  if(activeTab==='train') renderTrain();
  else if(activeTab==='progress') renderProgress();
  else renderProgramEditor();
}

document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    progressView = 'list';
    if(activeTab==='train'){
      document.getElementById('headerSub').textContent = getDay(activeDayId).name + ' · Day ' + activeDayId;
    } else if(activeTab==='progress'){
      document.getElementById('headerSub').textContent = 'Your lifting history';
    } else {
      document.getElementById('headerSub').textContent = 'Edit your program';
    }
    renderActiveTab();
  };
});

(async function init(){
  await loadData();
  renderActiveTab();
})();
</script>
